<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GRX | SECURE_HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --magenta: #d62f7f; --abyss: #050508; }
        body { background: var(--abyss); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        .admin-input { background: #0f101a; border: 1px solid #d62f7f33; padding: 10px; width: 100%; color: white; outline: none; font-size: 0.8rem; }
        .admin-input:focus { border-color: var(--magenta); box-shadow: 0 0 10px #d62f7f22; }
        .btn-pub { background: var(--magenta); color: white; padding: 12px; font-weight: bold; transition: 0.3s; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-pub:hover { background: white; color: var(--magenta); }
        
        /* Styles pour le dashboard (injectés plus tard par le JS) */
        .nav-link { border-left: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .nav-link.active { border-left: 2px solid var(--magenta); color: var(--magenta); background: #d62f7f0a; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-cancel { border: 1px solid #444; color: #888; padding: 12px; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }
        .btn-cancel:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="login-zone" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="max-w-md w-full border border-magenta/30 p-8 bg-black relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-magenta animate-pulse"></div>
            <h1 class="text-magenta text-xl mb-2 tracking-tighter uppercase font-bold text-center font-rajdhani">GRX_HQ_GATEWAY</h1>
            <p class="text-center text-[9px] text-gray-600 mb-8 uppercase tracking-widest">Restricted Access // Level 01</p>
            
            <input type="email" id="email" placeholder="ADMIN_EMAIL" class="admin-input mb-4">
            <input type="password" id="password" placeholder="PASSWORD" class="admin-input mb-6">
            <button id="login-button" class="btn-pub w-full">INITIALISER_LIAISON</button>
            <div id="login-error" class="text-red-500 text-[10px] mt-4 text-center hidden uppercase font-bold">Identifiants corrompus.</div>
        </div>
    </div>

    <div id="app-root" class="flex w-full min-h-screen hidden"></div>

    <template id="dashboard-template">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col bg-[#050508] z-20 relative shadow-[10px_0_30px_rgba(0,0,0,0.5)]">
            <div class="mb-12 text-center">
                <h2 class="text-magenta text-2xl font-bold italic tracking-tighter font-rajdhani">HQ_CONTROL</h2>
                <span class="text-[8px] text-green-500 uppercase tracking-widest animate-pulse">Status: Secured</span>
            </div>
            <nav class="space-y-4 flex-1">
                <div onclick="window.Core.switchView('view-broadcast')" class="nav-link p-3 text-xs uppercase tracking-widest" id="link-broadcast">// Broadcast</div>
                <div onclick="window.Core.switchView('view-news')" class="nav-link p-3 text-xs uppercase tracking-widest active" id="link-news">// News</div>
                <div onclick="window.Core.switchView('view-members')" class="nav-link p-3 text-xs uppercase tracking-widest" id="link-members">// Membres</div>
                <div onclick="window.Core.switchView('view-events')" class="nav-link p-3 text-xs uppercase tracking-widest" id="link-events">// Calendrier</div>
                
                <div onclick="window.Core.switchView('view-partners')" class="nav-link p-3 text-xs uppercase tracking-widest text-[#D4AF37]" id="link-partners">// Partenaires</div>
            </nav>
            <button onclick="window.Core.logout()" class="text-[10px] text-gray-600 hover:text-red-500 uppercase mt-auto transition-colors">[ Déconnexion ]</button>
        </aside>

        <main id="main-panel" class="flex-1 p-8 md:p-12 overflow-y-auto relative bg-[#020203]">
            </main>
    </template>

    <script type="module" src="./js/core.js"></script>
</body>
</html>
